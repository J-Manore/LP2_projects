<!DOCTYPE html>
<html>

<head>

    <title>City Hospital</title>

    <style>

        body {
            font-family: Arial;
            margin: 0;
            background: whitesmoke;
            padding: 20px;
        }

        header {
            background: teal;
            color: white;
            text-align: center;
            padding: 10px;
        }

        h2 {
            color: teal;
        }

        section {
            margin-bottom: 20px;
        }

        .chat-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: teal;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
        }

        .chatbox {
            display: none;
            position: fixed;
            bottom: 60px;
            right: 20px;
            width: 250px;
            background: white;
            border: 1px solid gray;
            padding: 10px;
        }

        .messages {
            height: 120px;
            overflow-y: auto;
            border: 1px solid lightgray;
            margin-bottom: 10px;
            padding: 5px;
        }

        .user {
            color: blue;
            text-align: right;
        }

        .bot {
            color: green;
        }

    </style>

</head>

<body>

<header>

    <h1>City Hospital</h1>

    <p>We Care for Your Health</p>

</header>


<section>

    <h2>About Us</h2>

    <p>
        City Hospital provides healthcare services with experienced doctors
        and emergency facilities.
    </p>

</section>


<section>

    <h2>Services</h2>

    <ul>
        <li>General Checkup</li>
        <li>Emergency Services</li>
        <li>Specialist Doctors</li>
    </ul>

</section>


<section>

    <h2>Contact</h2>

    <p>Phone: 1234567890</p>

    <p>Email: cityhospital@gmail.com</p>

</section>


<button class="chat-btn" onclick="toggleChat()">
    Chat
</button>


<section class="chatbox" id="chatbox">

    <h3>Help Desk</h3>

    <section class="messages" id="chat"></section>

    <input type="text" id="msg">

    <button onclick="send()">Send</button>

</section>


<script>

function toggleChat() {

    let box = document.getElementById("chatbox");

    if(box.style.display == "block")
        box.style.display = "none";

    else
        box.style.display = "block";
}



function send() {

    let input = document.getElementById("msg");

    let text = input.value.toLowerCase();

    let chat = document.getElementById("chat");

    if(text == "")
        return;

    chat.innerHTML += "<p class='user'>" + text + "</p>";

    let reply = "";

    if(text.includes("appointment"))
        reply = "Appointments available from 9AM to 5PM.";

    else if(text.includes("doctor"))
        reply = "Specialist doctors are available.";

    else if(text.includes("emergency"))
        reply = "Emergency services are available 24/7.";

    else if(text.includes("hello"))
        reply = "Hello! How can I help you?";

    else
        reply = "Please contact hospital staff.";

    chat.innerHTML += "<p class='bot'>" + reply + "</p>";

    input.value = "";

    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>

</html>
