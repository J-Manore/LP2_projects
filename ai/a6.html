<!DOCTYPE html>
<html>

<head>

    <title>Hospital Expert System</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: whitesmoke;
            padding: 20px;
        }

        header {
            background: teal;
            color: white;
            text-align: center;
            padding: 10px;
        }

        h2 {
            color: teal;
        }

        section {
            background: white;
            border: 1px solid lightgray;
            padding: 10px;
            margin-bottom: 15px;
        }

        button {
            background: teal;
            color: white;
            border: none;
            padding: 5px 10px;
        }

        #result {
            color: green;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <header>

        <h1>Hospital Expert System</h1>

        <p>AI Based Symptom Checker</p>

    </header>


    <section>

        <h2>Knowledge Base</h2>

        <ul>
            <li>Fever → Infection</li>
            <li>Cough → Cold</li>
            <li>Headache → Stress</li>
            <li>Chest Pain → Emergency</li>
            <li>Stomach Pain → Digestion Problem</li>
        </ul>

    </section>


    <section>

        <h2>Inference Engine</h2>

        <p>
            Matches user symptoms with rules from the knowledge base.
        </p>

    </section>


    <section>

        <h2>Check Symptoms</h2>

        <input type="text" id="symptom" placeholder="Enter symptom">

        <button onclick="diagnose()">
            Check
        </button>

        <p id="result"></p>

    </section>


    <script>


        // KNOWLEDGE BASE

        const knowledgeBase = {

            fever:
                "Possible Infection. Consult doctor.",

            cough:
                "Possible Cold. Drink warm fluids.",

            headache:
                "Take proper rest.",

            "chest pain":
                "Emergency! Visit hospital immediately.",

            stomach:
                "Possible digestion problem."
        };




        // INFERENCE ENGINE

        function diagnose() {

            let input =
                document.getElementById("symptom")
                    .value
                    .toLowerCase();

            let output =
                "No matching rule found.";


            for (let symptom in knowledgeBase) {

                if (input.includes(symptom)) {

                    output = knowledgeBase[symptom];

                    break;
                }
            }

            document.getElementById("result").innerText = output;
        }

    </script>

</body>

</html>
